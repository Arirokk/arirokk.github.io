<!--This app will allow us to paint some picture like the established Windows Paint-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paint on Canvas</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<!--two windows for size changing-->
<p>
  Width
  <input type = "text"
       onchange = "setWidth(value)">

  Height
  <input type = "text"
         onchange = "setHeight(value)">
</p>
<h2>Let's draw something ugly!</h2>
<!--create canvas with control from the mouse-->
<canvas id = "canvas1"
        onmousedown = "startPaint()"
        onmouseup = "endPaint()"
        onmousemove = "doPaint(event.offsetX, event.offsetY)">
</canvas>
<!--choosing the color of the brush-->
<p>
  Brush color
  <input type = "color"
         value = "#000"
         onchange = changeColor(this.value)>
  <!--choosing the size of the brush-->
  Brush size
  <input id = "brushSize"
         type = "range"
         min = "1"
         max = "30"
         oninput = "resizeBrush(this.value)">
  <!--showing the brush size-->
  <output id = "sizeOutput"></output>
</p>
<p>
  <input type = "button"
         value = "Clear the canvas"
         onclick = "clearCanvas()"
</p>
  <script  src="./script.js"></script>
</body>
</html>
