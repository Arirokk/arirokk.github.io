<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Screen Program</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<!--This program takes your image with green backdround
and an image for background then creates the composit
Both images should be the same dimensions-->
<div class = "header">
  <h3>Green Screen Program</h3>
</div>
<div class = "content">
  <p>
    Upload foreground
    <input id = "fgImageInput"
           type = "file"
           multiple = "false"
           accept = "image/*"
           onchange = "uploadFgImage()">
    Upload background
    <input id = "bgImageInput"
           type = "file"
           multiple = "false"
           accept = "image/*"
           onchange = "uploadBgImage()">
  </p>
  <p id = "canvasesHere">
  <br>
  <p>
    <input id = "createButton"
         type = "button"
         value = "Create a composit"
         onclick = "create()">
    <input id = "clearButton"
         type = "button"
         value = "Clear"
         onclick = "clearCanvases()">
  </p>
</div>
<script src="https://www.dukelearntoprogram.com/course1/common/js/image/SimpleImage.js"></script>
<script  src="./script.js"></script>

</body>
</html>
