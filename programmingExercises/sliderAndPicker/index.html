<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Slider and Color Picker Exercise</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>

<h3 id = "topic">Slider</h3>

<div>
  <canvas id = "canvas"
        width = "180px"
        height = "180px">
  </canvas>
</div>
<div>
  <input id = "slider"
         type = "range"
         min = "10"
         max = "80"
         value = "10"
         oninput = "doSquare()">
</div>
<div>
  <input id = "inputColor"
         type = "color"
         value = "#1f19d1"
         onchange = "inputColor()">
</div>

  <script  src="./script.js"></script>

</body>
</html>
